# Cross-cutting unit targets (not tied to one service row above)
cross_cutting:
  extreme_value_crash:
    generators: ExtremeValueGenerators
    unit:
      - ExtremeValueCrashFuzzTest
    jazzer:
      - IamPolicyEvaluatorJazzerTest
      - SigV4RequestValidatorJazzerTest
      - IamActionRegistryJazzerTest
    notes: crash/hang only; security oracles keep FuzzBodyGenerators.sanitize
  unit_parsers:
    - ResourceArnBuilderFuzzTest
    - ResourceArnBuilderScopedFuzzTest
    - ResourceArnBuilderPartiqlFuzzTest
    - ResourceArnBuilderJazzerTest
    - IntentionalWildcardScopeFuzzTest
    - CatalogOnlyScopeFuzzTest
    - ThinRestServicePathFuzzTest
    - IamActionRegistryFuzzTest
    - IamActionRegistryJazzerTest
    - IamActionRegistryJson11SplitFuzzTest
    - IamActionRegistryRestRulesFuzzTest
    - IamPolicyAndPrincipalFuzzTest
    - IamPolicyEvaluatorJazzerTest
    - IamSessionAndResourcePolicyFuzzTest
    - SigV4RequestValidatorFuzzTest
    - SigV4RequestValidatorJazzerTest
    - SigV4CredentialSmugglingFuzzTest
    - SigV4aAndPresignPathFuzzTest
    - PresignedPostConditionFuzzTest
    - FederatedTokenParserFuzzTest
    - ZipAndVtlFuzzTest
    - AccountAndIpFuzzTest
    - EcrRegistryPathFuzzTest
    - EcrRegistryAuthFuzzTest
    - EcrRegistrySignedDifferentialFuzzTest
    - TcpAuthTokenFuzzTest
    - OpenDataPlaneSurfaceFuzzTest
    - MqttConnectAuthFuzzTest
    - ExtremeValueCrashFuzzTest
  unit_bypass:
    - SecurityBypassAndEnvFuzzTest
    - PathClassificationMatrixFuzzTest
    - InProcessAuthorizerFuzzTest
    - InProcessDeliveryMatrixFuzzTest
    - InProcessSfnSdkMatrixFuzzTest
