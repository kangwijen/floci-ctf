  operator_http:
    - HttpDifferentialCampaignTest
    - ServiceProtocolCampaignTest
    - PresignAndAnonymousCampaignTest
    - SignedDifferentialCampaignTest
    - InternalEndpointCampaignTest
  operator_nonhttp:
    - NonHttpCampaignTest
    - ContainerCredentialsCampaignTest
  operator_delivery:
