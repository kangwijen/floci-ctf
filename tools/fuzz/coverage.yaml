    unit: [arn-matrix, IamActionRegistryFuzzTest, IamActionRegistryRestRulesFuzzTest, ZipAndVtlFuzzTest, InProcessAuthorizerFuzzTest, InProcessDeliveryMatrixFuzzTest]
    operator: [HttpDifferentialCampaignTest, ServiceProtocolCampaignTest]
    corpora: [rest/paths.txt, scopes/all-scopes.txt]
    gaps: execute-api stage invoke unsigned smoke only via rest corpus

  apigatewayv2:
