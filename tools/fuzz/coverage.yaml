version: 1

stages:
  - unit-parsers
  - unit-bypass
  - operator-http
  - operator-nonhttp
  - operator-delivery

# Inventory: 70 entries (69 AWS service packages under services/ plus floci internal).
# Unit class names verified under tools/fuzz/unit/ and tools/fuzz/operator/.
# Use "arn-matrix" when ResourceArnBuilderScopedFuzzTest covers the IAM scope via FuzzCredentialScopes.
# Use "protocol-smoke" when only ServiceProtocolCampaignTest unsigned REST/JSON/Query probes apply.
# Use "none" when no direct fuzz target exists yet.

services:
  acm:
    protocol: [json11]
    unit: [arn-matrix, IamActionRegistryFuzzTest, IamActionRegistryJson11SplitFuzzTest]
    operator: [ServiceProtocolCampaignTest]
    corpora: [json11/targets.txt]
    gaps: no dedicated acm corpus or signed differential

  amazonmq:
    protocol: [rest]
    unit: [CatalogOnlyScopeFuzzTest, ThinRestServicePathFuzzTest, IamActionRegistryFuzzTest, IamActionRegistryRestRulesFuzzTest]
    operator: [ServiceProtocolCampaignTest]
    corpora: [rest/paths.txt]
    gaps: no arn-matrix scope (catalog-only wildcard)

  apigateway:
