services:
  floci:
    build:
      context: .
      dockerfile: docker/Dockerfile
    tty: true
    ports:
      # Challenge Compose publishes host ports. Floci image (docker/Dockerfile) has no EXPOSE.
      # Default: AWS API only. Do not map Lambda Runtime API (9200-9299).
      # Add 5100 / 6379-6399 / 7001-7099 only when a challenge needs host ECR or Redis/RDS wire.
      # See docs/configuration/ports.md.
      - "4566:4566"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      FLOCI_AUTH_ROOT_ACCESS_KEY_ID: ${FLOCI_AUTH_ROOT_ACCESS_KEY_ID}
      # CTF security: IAM enforcement, strict bypass rules, and SigV4 validation.
      # Set FLOCI_AUTH_ROOT_* on the host before `docker compose up` (operator credentials).
      FLOCI_SERVICES_IAM_ENFORCEMENT_ENABLED: "true"
      FLOCI_SERVICES_IAM_STRICT_ENFORCEMENT_ENABLED: "true"
      FLOCI_AUTH_VALIDATE_SIGNATURES: "true"
      FLOCI_CTF_VALIDATE_FEDERATED_TOKENS: "true"
      FLOCI_CTF_REQUIRE_JWT_SIGNATURE_VERIFICATION: "true"
      FLOCI_CTF_REQUIRE_EKS_TOKEN_SIGV4: "true"
      # true = hide /_floci/* and /_localstack/* from players; all = also hide /health
      FLOCI_CTF_HIDE_INTERNAL_ENDPOINTS: "true"
      FLOCI_CTF_BLOCK_PRIVATE_OUTBOUND_URLS: "true"
      FLOCI_CTF_CONTAINER_CREDENTIALS_BIND_LOCALHOST: "true"
      # Link-local cred URIs (http://169.254.170.2:9171/v2/credentials/{token}); servers bind 0.0.0.0 on 9170/9171/9172.
      # Floci injects extra_hosts on spawned Lambda/ECS/CodeBuild containers (host-gateway or Floci container IP).
      # RELATIVE_URI is omitted on non-80 ports so botocore uses FULL_URI (with explicit port) instead of link-local :80.
      FLOCI_CTF_CONTAINER_CREDENTIALS_USE_LINK_LOCAL_URI: "true"
      FLOCI_SERVICES_ECR_REGISTRY_BASE_PORT: "5100"
      FLOCI_SERVICES_ECR_REGISTRY_MAX_PORT: "5100"
      FLOCI_AUTH_ROOT_SECRET_ACCESS_KEY: ${FLOCI_AUTH_ROOT_SECRET_ACCESS_KEY}
      FLOCI_SERVICES_DOCKER_NETWORK: floci_default
      FLOCI_SERVICES_RDS_PROXY_BASE_PORT: "7001"
      # FLOCI_STORAGE_HOST_PERSISTENT_PATH is no longer needed.
      # Floci now uses named Docker volumes by default.
      # If you were using this env var for persistence, migrate: docker volume ls -f label=floci=true
      FLOCI_HOSTNAME: floci
      FLOCI_BASE_URL: http://floci:4566
      # Hot-reload requires an explicit allowed host-path list when enabled.
      FLOCI_SERVICES_LAMBDA_HOT_RELOAD_ENABLED: "false"
      # Audit profile: persist service state across restarts; emit management API audit records.
      FLOCI_STORAGE_MODE: hybrid
      FLOCI_SERVICES_CLOUDTRAIL_AUDIT_ENABLED: "true"
      # TLS proxy serves HTTP and HTTPS on the same port 4566 (first-byte sniffing).
      FLOCI_TLS_ENABLED: "true"
    networks:
      floci_default:
        aliases:
          - localhost.floci.io

networks:
  floci_default:
    name: floci_default
