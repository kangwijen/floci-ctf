name: CI

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'pom.xml'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'pom.xml'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn test -B

  ctf-regression:
    name: CTF regression
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Run CTF regression subset
        run: >
          mvn test -B
          -Dtest=HealthServicesReportingIntegrationTest,CtfHideInternalEndpointsIntegrationTest,CtfHideInternalEndpointsAllIntegrationTest,ContainerEnvHardeningTest,EksTokenValidatorTest,EksTokenSigV4IntegrationTest,IamEnforcementIntegrationTest,IamEnforcementFilterTest,StsAssumeRoleTrustIntegrationTest,SigV4RequestValidatorTest,PreSignedUrlIntegrationTest,S3PresignedPostIntegrationTest,StsGetSessionTokenIntersectionIntegrationTest,StsGetFederationTokenIntersectionIntegrationTest,CtfComposeParityIntegrationTest,ResourceArnBuilderTest,IamActionRegistryTest,PolicyPrincipalMatcherTest,ResourcePolicyResolverTest,InProcessIamAuthorizerTest,IamPolicyEvaluatorTest,FederatedTokenParserTest,LambdaContainerCredentialsServerTest,LambdaContainerCredentialsIamIntegrationTest,DynamoDbBatchExecuteStatementScopedIntegrationTest,StsWebIdentityTrustHmacValidationIntegrationTest

  dependency-scan:
    name: Dependency CVE scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: fs
          scan-ref: pom.xml
          scanners: vuln
          severity: CRITICAL,HIGH
          exit-code: "0"
          format: table
          skip-dirs: compatibility-tests,docs,.git
